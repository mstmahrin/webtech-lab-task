<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Job Application Form</title>
</head>
<body>
    <h1>Online Job Application Form</h1>
    <form>
        <fieldset>
            <legend>Personal Information</legend>
            <label for="fname">Name:</label><br>
  <input type="text" id="fname" name="fname"><br>
<label for="nid">NID:</label><br>
  <input type="text" id="nid" name="nid"><br>
<label for="email">Email:</label><br>
  <input type="email" id="email" name="email"><br>
<label for="phone">Phone Number:</label><br>
  <input type="number" id="phone" name="phone"><br>
<label for="dob">Date Of Birth:</label><br>
  <input type="date" id="dob" name="dob"><br>

<p>Gender:</p>
<input type="radio" id="male" name="Gender" value="Male">
  <label for="male">Male</label><br>
<input type="radio" id="female" name="Gender" value="Female">
  <label for="female">Female</label><br>
<input type="radio" id="other" name="Gender" value="Other">
  <label for="other">Oher</label><br>





        </fieldset>
  <br>
  <fieldset>
     <legend>Job Information</legend>
     <label for="position">position Applied for:</label>

<select name="position" id="position">
  <option value=" Software Developer "> Software Developer </option>
  <option value="Web Designer ">Web Designer </option>
  <option value="Network Engineer ">Network Engineer </option>
  <option value=" Database Administrator "> Database Administrator </option>
<option value="  IT Support Officer "> IT Support Officer </option>
   
 

</select>

  </fieldset>
  <br>

  <fieldset>
            <legend>Skills</legend>

<input type="checkbox" id="html" name="skills" value="HTML">
<label for="html">HTML</label><br>

<input type="checkbox" id="css" name="skills" value="CSS">
<label for="css">CSS</label><br>

<input type="checkbox" id="javascript" name="skills" value="JavaScript">
<label for="javascript">JavaScript</label><br>

<input type="checkbox" id="python" name="skills" value="Python">
<label for="python">Python</label><br>

        </fieldset>
        <br>
<input type="submit" value="Submit ">
<input type="reset" value="Reset ">

    </form>
</body>
</html>
